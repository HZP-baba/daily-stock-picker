name: 每日选股
on:
  schedule:
    # 每天北京时间早上8点运行（UTC时间0点）
    - cron: '0 0 * * *'
  # 允许手动触发运行（方便测试）
  workflow_dispatch:

jobs:
  pick-stocks:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install tushare pandas numpy requests

      - name: 运行选股程序
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python stock_picker.py

      - name: 提交结果到仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add result.json stock_list_cache.json
          git commit -m "更新选股结果: $(date +'%Y-%m-%d')"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
