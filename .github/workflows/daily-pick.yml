name: 每日选股
on:
  schedule:
    # 每天北京时间早上8点运行（UTC时间0点）
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  pick-stocks:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # ✅ 新增：GitHub官方缓存，保存股票列表（有效期7天）
      - name: 缓存股票列表
        uses: actions/cache@v4
        with:
          path: stock_list_cache.json
          key: stock-list-cache-${{ github.run_id }}
          restore-keys: |
            stock-list-cache-

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install tushare pandas numpy requests

      - name: 运行选股程序并发送微信推送
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python stock_picker.py
